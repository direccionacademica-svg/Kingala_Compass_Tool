<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compass Tool · Magia</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Lato:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"><\/script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--red:#C8102E;--red-bright:#E8213E;--red-tint:rgba(200,16,46,0.08);--red-tint-mid:rgba(200,16,46,0.15);--text:#FFFFFF;--text-dim:rgba(255,255,255,0.65);--text-muted:rgba(255,255,255,0.35);--border:rgba(255,255,255,0.10);--border-mid:rgba(255,255,255,0.18);--surface:rgba(255,255,255,0.04);--surface-mid:rgba(255,255,255,0.08);--c-needs:#FF7F7F;--c-desires:#FFB347;--c-stereo:#F5E642;--c-emotions:#80DDB8;}
html{scroll-behavior:smooth;}
body{font-family:'Lato',sans-serif;background:#111010;color:var(--text);min-height:100vh;overflow-x:hidden;}
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 80% 55% at 10% 0%,rgba(200,16,46,0.25) 0%,transparent 65%),radial-gradient(ellipse 55% 45% at 92% 95%,rgba(200,16,46,0.15) 0%,transparent 60%),linear-gradient(170deg,#1A0608 0%,#111010 40%,#0C0C0C 100%);}
.bg::before{content:'';position:absolute;inset:0;background-image:radial-gradient(2px 2px at 7% 10%,rgba(255,255,255,0.6) 0%,transparent 100%),radial-gradient(2px 2px at 38% 6%,rgba(255,255,255,0.5) 0%,transparent 100%),radial-gradient(3px 3px at 94% 4%,rgba(255,255,255,0.65) 0%,transparent 100%),radial-gradient(2px 2px at 73% 9%,rgba(255,255,255,0.55) 0%,transparent 100%),radial-gradient(1px 1px at 20% 30%,rgba(255,255,255,0.3) 0%,transparent 100%),radial-gradient(2px 2px at 28% 75%,rgba(255,255,255,0.28) 0%,transparent 100%);}
#app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:2rem 1.5rem 5rem;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2.5rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border);}
.logo-group{display:flex;align-items:center;gap:14px;}
.logo-img{height:40px;width:auto;}
.logo-info{display:flex;flex-direction:column;line-height:1.25;}
.logo-name{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:800;color:#fff;}
.logo-name em{color:rgba(255,140,140,1);font-style:normal;}
.logo-sub{font-size:10px;color:var(--text-muted);letter-spacing:.6px;text-transform:uppercase;margin-top:2px;}
.badge{font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;padding:6px 14px;border-radius:20px;background:var(--red-tint-mid);border:1px solid rgba(200,16,46,0.4);color:rgba(255,150,150,1);}
.steps-bar{display:flex;margin-bottom:2.5rem;background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:5px;}
.step-pill{flex:1;padding:9px 12px;border-radius:40px;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:600;color:var(--text-muted);transition:all .3s;cursor:default;display:flex;align-items:center;justify-content:center;gap:7px;}
.step-pill.active{background:var(--red);color:#fff;}
.step-pill.done{color:rgba(255,150,150,1);cursor:pointer;}
.step-pill.done:hover{background:var(--red-tint-mid);}
.step-dot{width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,0.08);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-pill.active .step-dot{background:rgba(255,255,255,0.2);}
.step-pill.done .step-dot{background:rgba(255,100,100,0.18);color:rgba(255,150,150,1);}
.phase{display:none;}
.phase.active{display:block;animation:fadeUp .4s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.phase-title{font-family:'Montserrat',sans-serif;font-size:25px;font-weight:800;color:#fff;margin-bottom:.4rem;line-height:1.2;}
.phase-title .accent{color:rgba(255,130,130,1);}
.phase-sub{font-size:14px;color:var(--text-dim);margin-bottom:2rem;line-height:1.65;}
.form-group{margin-bottom:1.5rem;}
.form-label{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:rgba(255,150,150,1);margin-bottom:.6rem;display:block;}
.form-input,.form-textarea,.form-select{width:100%;background:var(--surface-mid);border:1px solid var(--border);border-radius:10px;color:#fff;font-family:'Lato',sans-serif;font-size:14px;padding:12px 16px;outline:none;transition:border-color .2s;resize:none;}
.form-input::placeholder,.form-textarea::placeholder{color:var(--text-muted);}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:rgba(200,16,46,0.65);background:var(--red-tint);}
.form-select{appearance:none;cursor:pointer;}
.form-select option{background:#1A0608;color:#fff;}
.form-textarea{min-height:110px;line-height:1.65;}
.form-hint{font-size:11px;color:var(--text-muted);margin-top:.4rem;font-style:italic;}
.btn-primary{width:100%;padding:15px;background:var(--red);color:#fff;border:none;border-radius:12px;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s,transform .15s;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:.5rem;}
.btn-primary:hover{background:var(--red-bright);}
.btn-primary:active{transform:scale(.98);}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;}
.loading-screen{display:none;text-align:center;padding:4.5rem 1rem;}
.loading-screen.visible{display:block;}
.spin-wrap{width:80px;height:80px;margin:0 auto 1.5rem;}
.spin-wrap svg{animation:spin 2.5s linear infinite;filter:drop-shadow(0 0 10px rgba(200,16,46,0.55));}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.loading-text{font-family:'Montserrat',sans-serif;font-size:15px;font-weight:600;color:var(--text-dim);margin-bottom:.4rem;}
.loading-sub{font-size:12px;color:var(--text-muted);font-style:italic;}
.ldots::after{content:'';animation:ld 1.4s infinite;}
@keyframes ld{0%{content:'';}33%{content:'.';}66%{content:'..';}100%{content:'...'}}
.compass-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.ctx-pill{font-size:12px;color:var(--text-dim);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 12px;display:inline-flex;align-items:center;gap:6px;}
.ctx-pill strong{color:#fff;}
.compass-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.75rem;}
.ccard{border-radius:14px;border:1px solid var(--border);background:var(--surface);padding:16px;position:relative;overflow:hidden;}
.ccard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0;}
.ccard.needs::before{background:var(--c-needs);}
.ccard.desires::before{background:var(--c-desires);}
.ccard.stereo::before{background:var(--c-stereo);}
.ccard.emotions::before{background:var(--c-emotions);}
.ctop{display:flex;align-items:center;gap:9px;margin-bottom:10px;}
.cicon{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.clabel{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
.needs .clabel{color:var(--c-needs);} .desires .clabel{color:var(--c-desires);} .stereo .clabel{color:var(--c-stereo);} .emotions .clabel{color:var(--c-emotions);}
.csublabel{font-size:10px;color:var(--text-muted);margin-top:1px;}
.ctextarea{width:100%;background:transparent;border:none;color:#fff;font-family:'Lato',sans-serif;font-size:13px;line-height:1.7;resize:none;outline:none;min-height:88px;padding:0;}
.ctextarea::placeholder{color:var(--text-muted);font-style:italic;}
.cactions{display:flex;gap:10px;}
.btn-back{flex:1;padding:13px;background:var(--surface);color:var(--text-dim);border:1px solid var(--border);border-radius:11px;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-back:hover{background:var(--surface-mid);color:#fff;}
.btn-validate{flex:2;padding:13px;background:var(--red);color:#fff;border:none;border-radius:11px;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-validate:hover{background:var(--red-bright);}
.strat-intro{background:var(--red-tint);border:1px solid rgba(200,16,46,0.28);border-radius:12px;padding:14px 18px;margin-bottom:1.75rem;font-size:13px;color:var(--text-dim);line-height:1.7;}
.strat-intro strong{color:rgba(255,150,150,1);}
.strat-sec{margin-bottom:2rem;}
.strat-hdr{display:flex;align-items:center;gap:10px;margin-bottom:1rem;padding-bottom:.7rem;border-bottom:1px solid var(--border);}
.strat-bar{width:4px;height:20px;border-radius:3px;flex-shrink:0;}
.strat-ttl{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;color:#fff;}
.strat-dim{font-size:10px;color:var(--text-muted);margin-left:auto;letter-spacing:.4px;text-transform:uppercase;}
.strat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;}
.strat-lbl{font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:7px;}
.strat-body{font-size:13px;color:var(--text-dim);line-height:1.7;}
.phrase-block{margin-top:12px;padding:12px 16px;background:rgba(255,255,255,0.04);border-radius:9px;border-left:3px solid var(--red);font-size:13px;font-style:italic;color:#fff;line-height:1.65;}
.phrase-lbl{font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:rgba(255,130,130,1);margin-bottom:6px;font-style:normal;}
.pn{border-left-color:var(--c-needs);} .pd{border-left-color:var(--c-desires);} .ps{border-left-color:var(--c-stereo);} .pe{border-left-color:var(--c-emotions);}
.strat-actions{display:flex;gap:10px;margin-top:2rem;flex-wrap:wrap;}
.btn-restart{flex:1;min-width:140px;padding:13px;background:var(--surface);color:var(--text-dim);border:1px solid var(--border);border-radius:11px;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-restart:hover{background:var(--surface-mid);color:#fff;}
.btn-export-pdf{flex:2;min-width:180px;padding:13px;background:var(--red);color:#fff;border:none;border-radius:11px;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-export-pdf:hover{background:var(--red-bright);}
.btn-export-pdf:disabled{opacity:.5;cursor:not-allowed;}
.err{background:rgba(200,16,46,0.1);border:1px solid rgba(200,16,46,0.3);border-radius:10px;padding:11px 16px;font-size:13px;color:rgba(255,130,130,1);margin-top:1rem;display:none;}
.footer{text-align:center;margin-top:3rem;font-size:11px;color:var(--text-muted);padding-top:1.25rem;border-top:1px solid var(--border);}
.footer span{color:rgba(255,130,130,1);}
@media(max-width:540px){.compass-grid{grid-template-columns:1fr;}.strat-actions,.cactions{flex-direction:column;}.phase-title{font-size:21px;}}
</style>
</head>
<body>
<div class="bg"></div>
<div id="app">
  <header class="header">
    <div class="logo-group">
      <img class="logo-img" id="logo-hdr" alt="Kingala">
      <div class="logo-info">
        <span class="logo-name">Magia <em>Compass</em></span>
        <span class="logo-sub">Workshop de Servicio al Cliente · Kingala</span>
      </div>
    </div>
    <span class="badge">✶ Compass Tool</span>
  </header>
  <div class="steps-bar">
    <div class="step-pill active" id="step1" onclick="goStep(1)"><div class="step-dot">1</div><span>Contexto</span></div>
    <div class="step-pill" id="step2" onclick="goStep(2)"><div class="step-dot">2</div><span>Compass</span></div>
    <div class="step-pill" id="step3" onclick="goStep(3)"><div class="step-dot">3</div><span>Estrategias</span></div>
  </div>
  <div class="phase active" id="phase1">
    <h1 class="phase-title">¿A quién quieres <span class="accent">atender?</span></h1>
    <p class="phase-sub">Cuéntanos en qué sector trabajas y cómo es el cliente que quieres abordar. Con eso generamos su perfil Compass en cuatro dimensiones.</p>
    <div class="form-group">
      <label class="form-label">Sector o área de desempeño</label>
      <select class="form-select" id="sector">
        <option value="" disabled selected>Selecciona tu sector…</option>
        <option>Retail / Comercio minorista</option><option>Hospitalidad y turismo</option>
        <option>Salud y bienestar</option><option>Banca y servicios financieros</option>
        <option>Educación</option><option>Tecnología y software</option>
        <option>Restaurantes y alimentos</option><option>Gobierno y sector público</option>
        <option>Inmobiliario</option><option>Logística y transporte</option>
        <option>Telecomunicaciones</option><option>Consultoría y servicios profesionales</option>
        <option>Otro</option>
      </select>
    </div>
    <div class="form-group" id="otro-group" style="display:none;">
      <label class="form-label">Especifica tu sector</label>
      <input class="form-input" id="sector-otro" type="text" placeholder="Ej: Manufactura automotriz, seguros de vida…"/>
    </div>
    <div class="form-group">
      <label class="form-label">Describe a tu cliente</label>
      <textarea class="form-textarea" id="client-desc" placeholder="Sé tan específico como puedas. Ej: Cliente de 35 a 50 años que lleva meses evaluando cambiar de proveedor de internet…"></textarea>
      <div class="form-hint">Cuanto más precisa sea la descripción, más útil será el Compass.</div>
    </div>
    <div class="err" id="err1">Por favor completa el sector y la descripción antes de continuar.</div>
    <button class="btn-primary" id="btn-gen" onclick="generateCompass()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="white" stroke-width="1.8"/><path d="M12 4v4M12 16v4M4 12h4M16 12h4" stroke="white" stroke-width="1.6" stroke-linecap="round"/><circle cx="12" cy="12" r="2.5" fill="white"/></svg>
      Generar Compass Tool
    </button>
  </div>
  <div class="loading-screen" id="loading">
    <div class="spin-wrap"><svg viewBox="0 0 80 80" fill="none" width="80" height="80"><circle cx="40" cy="40" r="34" stroke="rgba(200,16,46,0.18)" stroke-width="2.5"/><circle cx="40" cy="40" r="34" stroke="url(#g1)" stroke-width="2.5" stroke-dasharray="72 142" stroke-linecap="round"/><defs><linearGradient id="g1" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse"><stop stop-color="#E8213E"/><stop offset="1" stop-color="#FF7F7F" stop-opacity="0"/></linearGradient></defs><circle cx="40" cy="40" r="4" fill="#C8102E"/><path d="M40 40l2.5-9" stroke="#FFD0D0" stroke-width="2" stroke-linecap="round"/></svg></div>
    <div class="loading-text">Analizando el perfil del cliente<span class="ldots"></span></div>
    <div class="loading-sub">Construyendo las cuatro dimensiones del Compass</div>
  </div>
  <div class="phase" id="phase2">
    <div class="compass-top">
      <div><h1 class="phase-title">Tu <span class="accent">Compass</span></h1><p class="phase-sub" style="margin-bottom:0;">Revisa y edita cada dimensión. Cuando esté listo, valida para ver las estrategias.</p></div>
      <div class="ctx-pill" id="ctx-pill"><svg width="11" height="11" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/></svg><span id="pill-text"></span></div>
    </div>
    <div class="compass-grid">
      <div class="ccard needs"><div class="ctop"><div class="cicon">🧭</div><div><div class="clabel">Necesidades</div><div class="csublabel">Situacionales · racionales</div></div></div><textarea class="ctextarea" id="c-needs" placeholder="¿Qué problema práctico necesita resolver?"></textarea></div>
      <div class="ccard desires"><div class="ctop"><div class="cicon">✨</div><div><div class="clabel">Deseos</div><div class="csublabel">Resultado esperado · subjetivo</div></div></div><textarea class="ctextarea" id="c-desires" placeholder="¿Cuál es el resultado ideal que espera?"></textarea></div>
      <div class="ccard stereo"><div class="ctop"><div class="cicon">🔍</div><div><div class="clabel">Estereotipos</div><div class="csublabel">Preconcepciones · sesgos</div></div></div><textarea class="ctextarea" id="c-stereo" placeholder="¿Qué ideas previas trae sobre el servicio?"></textarea></div>
      <div class="ccard emotions"><div class="ctop"><div class="cicon">💫</div><div><div class="clabel">Emociones</div><div class="csublabel">Estado emocional · momento</div></div></div><textarea class="ctextarea" id="c-emotions" placeholder="¿Cómo se siente al llegar a la interacción?"></textarea></div>
    </div>
    <div class="err" id="err2">Asegúrate de que todas las dimensiones tengan contenido.</div>
    <div class="cactions">
      <button class="btn-back" onclick="goStep(1)">← Editar contexto</button>
      <button class="btn-validate" onclick="generateStrategies()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>Validar y ver estrategias</button>
    </div>
  </div>
  <div class="loading-screen" id="loading2">
    <div class="spin-wrap"><svg viewBox="0 0 80 80" fill="none" width="80" height="80"><circle cx="40" cy="40" r="34" stroke="rgba(200,16,46,0.15)" stroke-width="2.5"/><circle cx="40" cy="40" r="34" stroke="url(#g2)" stroke-width="2.5" stroke-dasharray="90 122" stroke-linecap="round"/><defs><linearGradient id="g2" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse"><stop stop-color="#FF7F7F"/><stop offset="1" stop-color="#C8102E" stop-opacity="0"/></linearGradient></defs><circle cx="40" cy="40" r="4" fill="#FF7F7F"/></svg></div>
    <div class="loading-text">Generando estrategias de atención<span class="ldots"></span></div>
    <div class="loading-sub">Preparando tácticas y frases para cada dimensión</div>
  </div>
  <div class="phase" id="phase3">
    <h1 class="phase-title">Estrategias de <span class="accent">atención</span></h1>
    <p class="phase-sub">Para cada dimensión encontrarás qué hacer y una frase que puedes usar directamente con tu cliente.</p>
    <div class="strat-intro" id="strat-summary"></div>
    <div id="strat-container"></div>
    <div class="err" id="err3"></div>
    <div class="strat-actions">
      <button class="btn-restart" onclick="restart()">↺ Nuevo cliente</button>
      <button class="btn-export-pdf" id="btn-pdf" onclick="exportPDF()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 3v13M7 11l5 5 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 20h14" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
        Descargar reporte PDF
      </button>
    </div>
  </div>
  <footer class="footer">Compass Tool · Programa <span>Magia</span> · Workshop de Servicio al Cliente · Kingala</footer>
</div>

    y+=ctxH+8;
    doc.setFillColor(200,16,46);doc.rect(ml,y,cw,8,'F');doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(10);doc.text('PERFIL COMPASS',ml+4,y+5.5);y+=12;
    [{key:'needs',label:'NECESIDADES',sub:'Situacionales · Racionales',cr:[255,127,127],bg:[255,242,242]},{key:'desires',label:'DESEOS',sub:'Resultado Esperado · Subjetivo',cr:[255,179,71],bg:[255,251,238]},{key:'stereo',label:'ESTEREOTIPOS',sub:'Preconcepciones · Sesgos',cr:[195,170,40],bg:[254,252,218]},{key:'emotions',label:'EMOCIONES',sub:'Estado Emocional · Momento',cr:[80,185,165],bg:[228,249,244]}].forEach(q=>{
      const lines=doc.splitTextToSize(S.compass[q.key]||'',cw-12);
      const bh=lines.length*4.5+18;
      if(y+bh>282){doc.addPage();y=18;}
      doc.setFillColor(...q.bg);doc.setDrawColor(...q.cr);doc.roundedRect(ml,y,cw,bh,3,3,'FD');
      doc.setFillColor(...q.cr);doc.rect(ml,y,3,bh,'F');
      doc.setTextColor(...q.cr);doc.setFont('helvetica','bold');doc.setFontSize(8.5);doc.text(q.label,ml+6,y+6.5);
      doc.setTextColor(120,120,120);doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.text(q.sub,ml+6,y+11.5);
      doc.setTextColor(40,40,40);doc.setFontSize(9);doc.text(lines,ml+6,y+16);
      y+=bh+5;
    });
    if(S.strategies){
      doc.addPage();y=0;
      doc.setFillColor(200,16,46);doc.rect(0,0,W,20,'F');doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(13);doc.text('ESTRATEGIAS DE ATENCIÓN',ml,13);
      y=28;
      if(S.strategies.summary){const sl=doc.splitTextToSize(S.strategies.summary,cw-10);const sh=sl.length*4.5+13;doc.setFillColor(255,245,245);doc.setDrawColor(200,16,46);doc.roundedRect(ml,y,cw,sh,3,3,'FD');doc.setTextColor(200,16,46);doc.setFont('helvetica','bold');doc.setFontSize(8);doc.text('ENFOQUE GENERAL',ml+5,y+6.5);doc.setFont('helvetica','normal');doc.setTextColor(50,50,50);doc.setFontSize(9);doc.text(sl,ml+5,y+12);y+=sh+8;}
      [{key:'needs',label:'NECESIDADES',cr:[255,127,127],bg:[255,245,245]},{key:'desires',label:'DESEOS',cr:[255,160,60],bg:[255,251,235]},{key:'stereo',label:'ESTEREOTIPOS',cr:[180,155,35],bg:[252,249,210]},{key:'emotions',label:'EMOCIONES',cr:[60,175,155],bg:[228,249,244]}].forEach(d=>{
        const st=S.strategies[d.key];if(!st)return;
        const sl2=doc.splitTextToSize(st.strategy||'',cw-12);
        const pl=doc.splitTextToSize('"'+(st.phrase||'')+'"',cw-18);
        const bh=sl2.length*4.5+pl.length*4.5+34;
        if(y+bh>276){doc.addPage();y=18;}
        doc.setFillColor(...d.cr);doc.rect(ml,y,cw,9,'F');doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(9);doc.text(d.label,ml+5,y+6.2);y+=11;
        const sh2=sl2.length*4.5+13;doc.setFillColor(250,250,250);doc.setDrawColor(220,220,220);doc.rect(ml,y,cw,sh2,'FD');doc.setTextColor(130,130,130);doc.setFont('helvetica','bold');doc.setFontSize(7.5);doc.text('QUÉ HACER',ml+5,y+6.5);doc.setFont('helvetica','normal');doc.setTextColor(40,40,40);doc.setFontSize(9);doc.text(sl2,ml+5,y+12);y+=sh2+3;
        const ph2=pl.length*4.5+13;doc.setFillColor(...d.bg);doc.setDrawColor(...d.cr);doc.roundedRect(ml,y,cw,ph2,2,2,'FD');doc.setFillColor(...d.cr);doc.rect(ml,y,3,ph2,'F');doc.setTextColor(...d.cr);doc.setFont('helvetica','bold');doc.setFontSize(7.5);doc.text('FRASE SUGERIDA',ml+6,y+6.5);doc.setFont('helvetica','italic');doc.setTextColor(40,40,40);doc.setFontSize(9);doc.text(pl,ml+6,y+12);y+=ph2+8;
      });
    }
    const pages=doc.getNumberOfPages();
    for(let i=1;i<=pages;i++){doc.setPage(i);doc.setFillColor(240,240,240);doc.rect(0,286,W,11,'F');doc.setFillColor(200,16,46);doc.rect(0,286,4,11,'F');doc.setTextColor(120,120,120);doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.text('Compass Tool · Programa Magia · Kingala AI Human Innovation',ml,292);doc.text('Página '+i+' de '+pages,W-mr,292,{align:'right'});}
    doc.save('compass-'+S.sector.replace(/[^a-z0-9]/gi,'-').toLowerCase()+'.pdf');
  }catch(e){console.error(e);alert('Error al generar el PDF. Intenta de nuevo.');}
  btn.disabled=false;
  btn.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 3v13M7 11l5 5 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 20h14" stroke="white" stroke-width="2" stroke-linecap="round"/></svg> Descargar reporte PDF';
}
function restart(){S.sector='';S.clientDesc='';S.compass={needs:'',desires:'',stereo:'',emotions:''};S.strategies=null;document.getElementById('sector').value='';document.getElementById('client-desc').value='';document.getElementById('otro-group').style.display='none';document.getElementById('strat-container').innerHTML='';showPhase(1);}
</script>
